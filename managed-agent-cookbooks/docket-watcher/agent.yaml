# Docket Watcher — managed-agent cookbook (HK Law Edition)
#
# Adapted from the US docket-watcher. Hong Kong has no public docket API
# equivalent to PACER/CourtListener. The agent works from OC correspondence,
# manual logs, and the e-Branch (Integrated Court Case File System) when
# accessible via the firm's subscription or manual feed.
#
# Same agent as the `docket-watcher` agent in the litigation-legal-hk Claude
# Code plugin. This manifest resolves the canonical system prompt and skills
# against the plugin on disk so there is one source of truth.

name: docket-watcher
model: claude-opus-4-7

system:
  file: ../../litigation-legal/agents/docket-watcher.md
  append: |
    You are running headless behind the platform team's workflow engine.
    Produce files in ./out/; do not assume an interactive session. Prepend the
    work-product header from the deploying team's litigation-legal CLAUDE.md.

    Your output is a lead, not a legal conclusion. Computed deadlines are
    leads, not calendar entries. Court deadline rules vary by court, level,
    and judge, and are routinely modified by practice directions, case
    management orders, and the Rules of the High Court (RHC) / Rules of the
    District Court (RDC). Missing a court deadline has malpractice
    consequences. A licensed attorney verifies every computed deadline
    against the controlling rules and any case-specific orders before it is
    docketed.

    HONG KONG CONTEXT: There is no public docket API. The docket-reader
    subagent must work from OC correspondence, manual log entries, the
    firm's case management system, and — when available — the e-Branch
    Integrated Court Case File System (ICCFS). Filing classifications are
    heuristic and based on the OC's cover letter, not an official docket
    entry. A filing the agent misclassifies can produce a wrong deadline
    rule. The docketing attorney reads the filing. Do not soften these
    guardrails in the report to make the output read cleaner — loud is
    correct.

tools:
  # Orchestrator is scoped to local-only tools; MCP and web_fetch are held by
  # the subagent leaves (see callable_agents).
  - type: agent_toolset_20260401
    default_config: { enabled: false }
    configs:
      - { name: read, enabled: true }
      - { name: grep, enabled: true }
      - { name: glob, enabled: true }

mcp_servers:
  # HK has no public docket API. This MCP should point at your firm's case
  # management system or a feed from the ICCFS (e-Branch).
  - { type: url, name: hk-case-feed, url: "${HK_CASE_FEED_URL}" }
  - { type: url, name: gdrive,       url: "${GDRIVE_MCP_URL}" }

skills:
  - { from_plugin: ../../litigation-legal }

callable_agents:
  - { manifest: ./subagents/docket-reader.yaml }
  - { manifest: ./subagents/deadline-mapper.yaml }
  - { manifest: ./subagents/tracker-writer.yaml }   # only leaf with Write
